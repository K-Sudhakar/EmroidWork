services:
  embroidery-api:
    build:
      context: .
      args:
        INKSTITCH_VERSION: "3.2.2"
        INKSTITCH_ARCH: "x86_64"
    environment:
      APP_NAME: "${APP_NAME:-Embroidery Processing API}"
      ENVIRONMENT: "${ENVIRONMENT:-local}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      DATA_PATH: "${DATA_PATH:-/data}"
      MAX_FILE_SIZE: "${MAX_FILE_SIZE:-10485760}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"
      INKSCAPE_PATH: "${INKSCAPE_PATH:-inkscape}"
      INKSTITCH_EXT_PATH: "${INKSTITCH_EXT_PATH:-/root/.config/inkscape/extensions}"
      INKSTITCH_BIN_PATH: "${INKSTITCH_BIN_PATH:-/root/.config/inkscape/extensions/inkstitch/bin/inkstitch}"
      INKSTITCH_TIMEOUT_SECONDS: "${INKSTITCH_TIMEOUT_SECONDS:-300}"
      IMAGEMAGICK_PATH: "${IMAGEMAGICK_PATH:-convert}"
      POTRACE_PATH: "${POTRACE_PATH:-potrace}"
      RASTER_VECTORIZE_TIMEOUT_SECONDS: "${RASTER_VECTORIZE_TIMEOUT_SECONDS:-120}"
      RASTER_MAX_DIMENSION: "${RASTER_MAX_DIMENSION:-512}"
      SVG_PREFLIGHT_MAX_ELEMENTS: "${SVG_PREFLIGHT_MAX_ELEMENTS:-5000}"
      SVG_PREFLIGHT_MAX_PATHS: "${SVG_PREFLIGHT_MAX_PATHS:-2000}"
      SVG_PREFLIGHT_MAX_PATH_DATA_CHARS: "${SVG_PREFLIGHT_MAX_PATH_DATA_CHARS:-250000}"
      SVG_PREFLIGHT_MAX_DIMENSION: "${SVG_PREFLIGHT_MAX_DIMENSION:-10000}"
      SVG_PREFLIGHT_ALLOW_EMBEDDED_IMAGES: "${SVG_PREFLIGHT_ALLOW_EMBEDDED_IMAGES:-false}"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped
