services:
  embroidery-api:
    build:
      context: .
      args:
        INKSTITCH_VERSION: "3.2.2"
        INKSTITCH_ARCH: "x86_64"
    environment:
      APP_NAME: "${APP_NAME:-Embroidery Processing API}"
      ENVIRONMENT: "${ENVIRONMENT:-local}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      DATA_PATH: "${DATA_PATH:-/data}"
      MAX_FILE_SIZE: "${MAX_FILE_SIZE:-10485760}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"
      INKSCAPE_PATH: "${INKSCAPE_PATH:-inkscape}"
      INKSTITCH_EXT_PATH: "${INKSTITCH_EXT_PATH:-/root/.config/inkscape/extensions}"
      INKSTITCH_BIN_PATH: "${INKSTITCH_BIN_PATH:-/root/.config/inkscape/extensions/inkstitch/bin/inkstitch}"
      INKSTITCH_TIMEOUT_SECONDS: "${INKSTITCH_TIMEOUT_SECONDS:-300}"
      INKSTITCH_MAX_TIMEOUT_SECONDS: "${INKSTITCH_MAX_TIMEOUT_SECONDS:-900}"
      INKSTITCH_USE_XVFB: "${INKSTITCH_USE_XVFB:-false}"
      IMAGEMAGICK_PATH: "${IMAGEMAGICK_PATH:-convert}"
      POTRACE_PATH: "${POTRACE_PATH:-potrace}"
      RASTER_VECTORIZE_TIMEOUT_SECONDS: "${RASTER_VECTORIZE_TIMEOUT_SECONDS:-120}"
      RASTER_MAX_DIMENSION: "${RASTER_MAX_DIMENSION:-512}"
      RASTER_VECTORIZE_MODE: "${RASTER_VECTORIZE_MODE:-color}"
      RASTER_VECTORIZE_THRESHOLD: "${RASTER_VECTORIZE_THRESHOLD:-160}"
      RASTER_VECTORIZE_COLORS: "${RASTER_VECTORIZE_COLORS:-8}"
      RASTER_BACKGROUND_TOLERANCE: "${RASTER_BACKGROUND_TOLERANCE:-0}"
      RASTER_PRESERVE_BACKGROUND: "${RASTER_PRESERVE_BACKGROUND:-false}"
      RASTER_TURDSIZE: "${RASTER_TURDSIZE:-8}"
      RASTER_OPTTOLERANCE: "${RASTER_OPTTOLERANCE:-0.2}"
      RASTER_MAX_PATH_DATA_CHARS: "${RASTER_MAX_PATH_DATA_CHARS:-250000}"
      RASTER_MIN_DIMENSION: "${RASTER_MIN_DIMENSION:-192}"
      RASTER_MIN_COLORS: "${RASTER_MIN_COLORS:-2}"
      SVG_PREFLIGHT_MAX_ELEMENTS: "${SVG_PREFLIGHT_MAX_ELEMENTS:-5000}"
      SVG_PREFLIGHT_MAX_PATHS: "${SVG_PREFLIGHT_MAX_PATHS:-2000}"
      SVG_PREFLIGHT_MAX_PATH_DATA_CHARS: "${SVG_PREFLIGHT_MAX_PATH_DATA_CHARS:-250000}"
      SVG_PREFLIGHT_MAX_DIMENSION: "${SVG_PREFLIGHT_MAX_DIMENSION:-10000}"
      SVG_PREFLIGHT_ALLOW_EMBEDDED_IMAGES: "${SVG_PREFLIGHT_ALLOW_EMBEDDED_IMAGES:-false}"
      DESIGN_MAX_WIDTH_MM: "${DESIGN_MAX_WIDTH_MM:-100}"
      DESIGN_MAX_HEIGHT_MM: "${DESIGN_MAX_HEIGHT_MM:-100}"
      DESIGN_MIN_WIDTH_MM: "${DESIGN_MIN_WIDTH_MM:-1}"
      DESIGN_MIN_HEIGHT_MM: "${DESIGN_MIN_HEIGHT_MM:-1}"
      DESIGN_MIN_PATH_DIMENSION_MM: "${DESIGN_MIN_PATH_DIMENSION_MM:-0.4}"
      DESIGN_MAX_TINY_PATHS: "${DESIGN_MAX_TINY_PATHS:-20}"
      DST_MIN_STITCHES: "${DST_MIN_STITCHES:-1}"
      DST_MAX_STITCHES: "${DST_MAX_STITCHES:-100000}"
      EMBROIDERY_FILL_ROW_SPACING_MM: "${EMBROIDERY_FILL_ROW_SPACING_MM:-0.4}"
      EMBROIDERY_FILL_MAX_STITCH_LENGTH_MM: "${EMBROIDERY_FILL_MAX_STITCH_LENGTH_MM:-4.0}"
      EMBROIDERY_FILL_UNDERLAY: "${EMBROIDERY_FILL_UNDERLAY:-true}"
      EMBROIDERY_FILL_UNDERLAY_INSET_MM: "${EMBROIDERY_FILL_UNDERLAY_INSET_MM:-0.4}"
      EMBROIDERY_FILL_UNDERLAY_ROW_SPACING_MM: "${EMBROIDERY_FILL_UNDERLAY_ROW_SPACING_MM:-3.0}"
      EMBROIDERY_RUNNING_STITCH_LENGTH_MM: "${EMBROIDERY_RUNNING_STITCH_LENGTH_MM:-2.5}"
      EMBROIDERY_RUNNING_STITCH_REPEATS: "${EMBROIDERY_RUNNING_STITCH_REPEATS:-1}"
      EMBROIDERY_LOCK_STITCHES: "${EMBROIDERY_LOCK_STITCHES:-true}"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped
